<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Generation Justice Logo</title>
  <desc id="desc">Circular Generation Justice seal in navy and gold with Lady Justice, sword, and scales.</desc>
  <defs>
    <style>
      .navy { fill: #17314f; }
      .navy-stroke { stroke: #17314f; }
      .gold { fill: #b99a5b; }
      .gold-stroke { stroke: #b99a5b; }
      .white { fill: #ffffff; }
      .soft { fill: #eef2f5; }
      text { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 4px; }
    </style>
    <path id="topArc" d="M 150 304 A 355 355 0 0 1 750 304" />
    <path id="bottomArc" d="M 130 505 A 385 385 0 0 0 770 505" />
  </defs>

  <circle cx="450" cy="450" r="444" class="white"/>
  <circle cx="450" cy="450" r="430" fill="none" class="navy-stroke" stroke-width="28"/>
  <circle cx="450" cy="450" r="292" fill="none" class="navy-stroke" stroke-width="18"/>
  <circle cx="91" cy="357" r="18" class="gold"/>
  <circle cx="809" cy="357" r="18" class="gold"/>

  <text font-size="50" class="navy">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">FIAT JUSTITIA RUAT CAELUM</textPath>
  </text>
  <text font-size="50" class="navy">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">THE NEXT GENERATION RISING FOR JUSTICE</textPath>
  </text>

